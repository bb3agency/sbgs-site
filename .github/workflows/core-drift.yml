# core-drift — HARD GATE. Fails the build if this client repo's CORE files
# diverge from the platform tag pinned in PLATFORM_VERSION. This is what
# structurally prevents "client edited a core file" → the root cause of every
# sync merge conflict. Runs ONLY in client repos (guarded on TEMPLATE_REPO var,
# which the template repo itself does not set) and is opt-outable per-repo via
# repo Variable CORE_DRIFT_ENABLED=false.
#
# Auth note: the template fetch is authenticated by the CHECKOUT token's persisted
# git auth header (a token that can READ the template). We use CORE_SYNC_PAT for
# this (it already has that access — it's what core-sync uses). A dedicated
# read-only TEMPLATE_READ_PAT is preferred long-term; if you set one with
# Contents:Read on the template, swap it into the checkout token below.
#
# Requires (already present on clients):
#   repo Variable TEMPLATE_REPO   — e.g. bb3agency/ecom-platform-template
#   repo Secret   CORE_SYNC_PAT   — can read the template (used as checkout token)
# See backend/docs/PLATFORM_VERSIONING_AND_SYNC_GUIDE.md §7.
name: core-drift

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  drift:
    # Inert in the template repo (no TEMPLATE_REPO var) and where explicitly disabled.
    if: ${{ vars.TEMPLATE_REPO != '' && vars.CORE_DRIFT_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # The persisted auth header for THIS token authenticates the plain-URL
          # template fetch below (same mechanism core-sync relies on). It must be a
          # token that can read the template — TEMPLATE_READ_PAT currently cannot,
          # so we use CORE_SYNC_PAT.
          token: ${{ secrets.CORE_SYNC_PAT || secrets.TEMPLATE_READ_PAT || github.token }}

      - name: Preconditions (jq + check script)
        run: |
          set -euo pipefail
          command -v jq >/dev/null || { sudo apt-get update -y && sudo apt-get install -y jq; }
          [ -f backend/scripts/check-core-drift.sh ] || { echo "::error::check-core-drift.sh missing"; exit 1; }

      - name: Wire template remote (read-only)
        env:
          TEMPLATE_REPO: ${{ vars.TEMPLATE_REPO }}
        run: |
          set -euo pipefail
          [ -n "${TEMPLATE_REPO:-}" ] || { echo "::error::repo variable TEMPLATE_REPO is not set"; exit 1; }
          git remote remove template 2>/dev/null || true
          # Plain URL — authenticated by the checkout token's persisted auth header.
          git remote add template "https://github.com/${TEMPLATE_REPO}.git"
          git fetch template --tags --quiet

      - name: Strict core-drift check
        env:
          CORE_DRIFT_STRICT: "true"
          TEMPLATE_REMOTE: template
        run: bash backend/scripts/check-core-drift.sh

      - name: Scrub template remote
        if: always()
        run: git remote remove template 2>/dev/null || true
