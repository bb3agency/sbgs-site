# core-sync — runs IN a client repo. Triggered by the template's release-train
# (via `gh workflow run core-sync.yml -R <client>`), or manually. Pulls the core
# files for a platform release tag into a branch and opens a PR for review.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TEMPLATE_READ_PAT — token that can READ the private template repo (contents:read).
#   CORE_SYNC_PAT     — (recommended) token used to push the branch + open the PR.
#                       Using a PAT (not the default GITHUB_TOKEN) is what lets the
#                       client's own CI run on the resulting PR. Falls back to
#                       GITHUB_TOKEN if unset (PR opens, but CI will NOT auto-run on it).
#
# Required repo variable:
#   TEMPLATE_REPO — e.g. bb3agency/ecom-platform-template
name: core-sync

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Core tag to sync (e.g. backend-core-v0.1.2 or frontend-core-v0.2.0)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout client repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CORE_SYNC_PAT || github.token }}

      - name: Validate inputs + secrets
        env:
          TEMPLATE_REPO: ${{ vars.TEMPLATE_REPO }}
          TEMPLATE_READ_PAT: ${{ secrets.TEMPLATE_READ_PAT }}
        run: |
          set -euo pipefail
          [ -n "${TEMPLATE_REPO:-}" ] || { echo "::error::repo variable TEMPLATE_REPO is not set"; exit 1; }
          [ -n "${TEMPLATE_READ_PAT:-}" ] || { echo "::error::repo secret TEMPLATE_READ_PAT is not set"; exit 1; }
          [ -f backend/scripts/sync-core.mjs ] || { echo "::error::backend/scripts/sync-core.mjs missing in this repo"; exit 1; }
          if [ -z "${{ secrets.CORE_SYNC_PAT }}" ]; then
            echo "::warning::CORE_SYNC_PAT not set — PR will open with GITHUB_TOKEN and the client's CI will NOT auto-run on it. Review manually."
          fi

      - name: Wire template remote (read-only) + fetch tag
        env:
          TEMPLATE_REPO: ${{ vars.TEMPLATE_REPO }}
          TEMPLATE_READ_PAT: ${{ secrets.TEMPLATE_READ_PAT }}
        run: |
          set -euo pipefail
          git remote remove template 2>/dev/null || true
          git remote add template "https://x-access-token:${TEMPLATE_READ_PAT}@github.com/${TEMPLATE_REPO}.git"
          git fetch template --tags --quiet
          # verify the requested tag actually exists upstream before proceeding
          git rev-parse --verify "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1 \
            || { echo "::error::tag ${{ inputs.tag }} not found in ${TEMPLATE_REPO}"; exit 1; }

      - name: Sync core files for the tag
        run: node backend/scripts/sync-core.mjs --tag "${{ inputs.tag }}" --remote template

      - name: Scrub token from remote config
        if: always()
        run: git remote remove template 2>/dev/null || true

      - name: Commit + open/refresh PR
        env:
          GH_TOKEN: ${{ secrets.CORE_SYNC_PAT || github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          BRANCH="core-sync/${TAG}"
          git config user.name "core-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes — this repo is already at ${TAG}. Nothing to do."
            exit 0
          fi

          # Detect conflict markers the 3-way engine may have left (client-local
          # edits overlapping the core change). These are committed on purpose so
          # the PR's CI goes red and a human resolves them — never silently dropped.
          CONFLICTS="$(git diff --name-only | while read -r f; do
            [ -f "$f" ] && grep -lE '^<{7}|^={7}$|^>{7}' "$f" 2>/dev/null || true
          done)"

          # Always regenerate the branch from CURRENT main (this run's checkout),
          # so it is strictly ahead of main → clean fast-forward, never a stale merge.
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "chore: sync ${TAG} from platform core"
          git push -u origin "$BRANCH" --force-with-lease

          # Make future cycles self-cleaning: deleting the head branch on merge stops
          # closed/merged PRs from shadowing the next sync. Best-effort (needs admin PAT).
          gh api -X PATCH "repos/${GH_REPO}" -F delete_branch_on_merge=true >/dev/null 2>&1 \
            || echo "::notice::could not set delete_branch_on_merge (PAT lacks admin) — set it once in repo Settings."

          # Ensure labels exist (best-effort).
          gh label create core-sync   --color 0e8a16 --description "Automated platform-core sync" >/dev/null 2>&1 || true
          gh label create has-conflicts --color b60205 --description "Sync left conflict markers — resolve before merge" >/dev/null 2>&1 || true

          LABELS="core-sync"
          BODY="Automated platform-core sync to \`${TAG}\` via 3-way merge.

          - Only core files (per \`core-manifest.json\`) were updated; design / client / approved-divergence paths are untouched.
          - The engine applied the **delta** between the previously-pinned tag and \`${TAG}\` (client-local edits preserved; deletions & renames applied).
          - Review the diff + the \`CHANGELOG.md\` entry, let CI run, then squash-merge to deploy."

          if [ -n "$CONFLICTS" ]; then
            LABELS="core-sync,has-conflicts"
            BODY="${BODY}

          ⚠ **CONFLICT MARKERS present** (client-local edits overlapped the core change). CI will stay red until resolved:
          $(echo "$CONFLICTS" | sed 's/^/          - /')

          Resolve each, then push to this branch."
          fi

          # Gate on OPEN PRs only — a CLOSED/merged PR on this branch must NOT block a
          # fresh one (that was the old 'gh pr view' bug). Never reopen (head desync).
          OPEN_PR="$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number // empty')"
          if [ -n "$OPEN_PR" ]; then
            echo "Open PR #$OPEN_PR already tracks $BRANCH — branch refreshed."
            gh pr edit "$OPEN_PR" --add-label "$LABELS" >/dev/null 2>&1 || true
          else
            gh pr create --base main --head "$BRANCH" \
              --title "core-sync: ${TAG}" \
              --label "$LABELS" \
              --body "$BODY"
          fi
