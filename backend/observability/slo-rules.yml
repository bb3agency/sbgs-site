groups:
  - name: ecom-slo-recording
    rules:
      - record: slo:checkout_success:ratio_5m
        expr: sum(rate(checkout_requests_total{result="success"}[5m])) / clamp_min(sum(rate(checkout_requests_total[5m])), 1)
      - record: slo:error_budget_consumed_percent
        expr: (1 - slo:checkout_success:ratio_5m) * 100
      - record: slo:webhook_latency:p95_5m
        expr: histogram_quantile(0.95, sum(rate(webhook_processing_duration_seconds_bucket[5m])) by (le))
      - record: slo:outbox_lag_seconds:p95_5m
        expr: max(outbox_oldest_pending_lag_seconds)
      - record: slo:outbox_dead_letter_depth:max_5m
        expr: max(outbox_dead_letter_depth)
      - record: slo:auth_challenge_failure:ratio_5m
        expr: sum(rate(auth_challenge_total{result=~"failed|error"}[5m])) / clamp_min(sum(rate(auth_challenge_total[5m])), 1)
      - record: slo:queue_retryable_failures:rate_5m
        expr: sum(rate(queue_retryable_failures_total[5m]))
      - record: slo:queue_terminal_failure_ratio:5m
        expr: sum(rate(queue_terminal_failures_total[5m])) / clamp_min(sum(rate(queue_jobs_total{result=~"success|failure"}[5m])), 1)
      - record: slo:queue_backlog:max_5m
        expr: max(queue_waiting_depth)
      - record: slo:queue_oldest_waiting:max_5m
        expr: max(queue_oldest_waiting_age_seconds)
      - record: slo:queue_stall:rate_5m
        expr: sum(rate(queue_worker_stalled_total[5m]))
      - record: slo:outbox_dead_letter_growth:rate_5m
        expr: sum(rate(queue_dlq_growth_total{queue="outbox-dispatch"}[5m]))
      - record: slo:queue_dlq_total_depth:max_5m
        expr: max(queue_waiting_depth{queue="dead-letter"})

  - name: ecom-slo-burnrate-alerts
    rules:
      - alert: CheckoutErrorBudgetFastBurn
        expr: (1 - slo:checkout_success:ratio_5m) > (14.4 * 0.001)
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Checkout SLO fast burn (5m/1h)"
      - alert: CheckoutErrorBudgetSlowBurn
        expr: (1 - slo:checkout_success:ratio_5m) > (6 * 0.001)
        for: 30m
        labels:
          severity: page
        annotations:
          summary: "Checkout SLO sustained burn (30m/6h)"
      - alert: CheckoutErrorBudgetTicket
        expr: (1 - slo:checkout_success:ratio_5m) > (1 * 0.001)
        for: 6h
        labels:
          severity: ticket
        annotations:
          summary: "Checkout SLO budget consumption (6h/3d)"
      - alert: WebhookLatencyFastBurn
        expr: slo:webhook_latency:p95_5m > 0.5
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Webhook latency p95 fast burn"
      - alert: OutboxDeadLetterDepthHigh
        expr: slo:outbox_dead_letter_depth:max_5m > 10
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Outbox dead-letter depth exceeded threshold"
      - alert: OutboxLagHigh
        expr: slo:outbox_lag_seconds:p95_5m > 120
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Outbox lag exceeded threshold"
      - alert: QueueFailureFastBurn
        expr: slo:queue_terminal_failure_ratio:5m > 0.1
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Terminal queue failures are burning error budget quickly"
      - alert: QueueFailureSlowBurn
        expr: slo:queue_terminal_failure_ratio:5m > 0.03
        for: 30m
        labels:
          severity: ticket
        annotations:
          summary: "Terminal queue failures are sustaining budget burn"
      - alert: QueueRetryableFailuresElevated
        expr: slo:queue_retryable_failures:rate_5m > 1
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Retryable queue failures are elevated"
      - alert: QueueBacklogHigh
        expr: slo:queue_backlog:max_5m > 200
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: "Queue backlog is elevated"
      - alert: QueueBacklogCritical
        expr: slo:queue_backlog:max_5m > 1000
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Queue backlog is critical"
      - alert: QueueOldestWaitingHigh
        expr: slo:queue_oldest_waiting:max_5m > 600
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Queue oldest waiting job age is too high"
      - alert: QueueWorkerStallDetected
        expr: slo:queue_stall:rate_5m > 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Queue worker stall detected"
      - alert: OutboxDeadLetterGrowthHigh
        expr: slo:outbox_dead_letter_growth:rate_5m > 0.1
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Outbox dead-letter growth rate is elevated"
      - alert: QueueDLQDepthHigh
        expr: slo:queue_dlq_total_depth:max_5m > 50
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Dead-letter queue depth is high — terminal failures accumulating"
      - alert: AuthChallengeFailureSpike
        expr: slo:auth_challenge_failure:ratio_5m > 0.35
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "Auth challenge failures are spiking"
